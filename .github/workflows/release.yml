name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.11"
      - name: Validate release tag
        run: |
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml)"
          test "$GITHUB_REF_NAME" = "v$version"
      - name: Install package smoke-test libraries
        run: sudo apt-get update && sudo apt-get install -y appstream desktop-file-utils libegl1 libgl1 libhidapi-hidraw0
      - name: Sync dependencies
        run: uv sync --extra dev --frozen
      - name: Build release files
        run: |
          ./scripts/package.sh
          ./packaging/appimage/build-appimage.sh
          (cd dist && sha256sum --check SHA256SUMS)
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes \
              --title "Vaydeer Studio ${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber
