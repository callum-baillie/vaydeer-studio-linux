name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install desktop libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libhidapi-hidraw0
      - name: Sync dependencies
        run: uv sync --extra dev --frozen
      - name: Lint
        run: uv run ruff check src tests
      - name: Format
        run: uv run ruff format --check src tests
      - name: Type check
        run: uv run mypy src
      - name: Test
        run: uv run pytest -q
      - name: Build source and wheel
        if: matrix.python-version == '3.11'
        run: ./scripts/package.sh
      - name: Test isolated user installation
        if: matrix.python-version == '3.11'
        run: ./scripts/test-install.sh
      - name: Validate release resources
        run: ./scripts/check-docs.sh
      - name: Qt mock smoke test
        run: QT_QPA_PLATFORM=offscreen QT_QUICK_BACKEND=software uv run vaydeer-studio --mock jp1011 --smoke
