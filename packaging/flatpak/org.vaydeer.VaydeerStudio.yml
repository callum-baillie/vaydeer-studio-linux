app-id: org.vaydeer.VaydeerStudio
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: vaydeer-studio
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=all
  - --filesystem=xdg-run/vaydeer-studio:create
modules:
  - name: vaydeer-studio
    buildsystem: simple
    build-commands:
      - python3 -m pip install --no-deps --prefix=/app .
    sources:
      - type: dir
        path: ../..
